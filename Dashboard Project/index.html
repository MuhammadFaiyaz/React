<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="container">
        <div class="elem" id="0">
          <img src="./img/conny-schneider-2-kXLvGOU5A-unsplash.jpg" alt="" />
          <h2>Todo List</h2>
        </div>
        <div class="elem" id="1">
          <img src="./img/ferhat-deniz-fors-MUXT1ykAz4c-unsplash.jpg" alt="" />
          <h2>Daily Planner</h2>
        </div>
        <div class="elem" id="2">
          <img src="./img/dhanya-purohit-tZQejnA6sCg-unsplash.jpg" alt="" />
          <h2>Motivational quotes</h2>
        </div>
        <div class="elem" id="3">
          <img src="./img/martin-brechtl-6fLeuILx85I-unsplash.jpg" alt="" />
          <h2>Pomodoro Timer</h2>
        </div>
        <div class="elem" id="4">
          <img src="./img/rick-rothenberg-hevwIHh0ntI-unsplash.jpg" alt="" />
          <h2>Daily Timers</h2>
        </div>
      </section>

      <section class="fullElem todos">
        <div class="top">
          <h2>Todos section</h2>
          <button class="close-btn">Close</button>
        </div>
        <div class="todos-body">
          <div class="addTask">
            <form id="taskForm">
              <input type="text" id="taskInput" placeholder="Add a task" />
              <input type="checkbox" name="" id="checkbox" />
              <label for="checkbox">Important</label>
              <button class="add-btn" type="submit">Add</button>
            </form>
          </div>

          <div class="allTask" id="allTask">
            
            
          </div>
        </div>
      </section>
      <section class="fullElem dailyPlanner">
        <h2>Day Planner</h2>
        <button class="close-btn">Close</button>
      </section>
      <section class="fullElem motivs">
        <h2>Motivational quotes</h2>
        <button class="close-btn">Close</button>
      </section>
      <section class="fullElem pomodoro">
        <h2>Pomodoro Timers</h2>
        <button class="close-btn">Close</button>
      </section>
      <section class="fullElem dailyTimer">
        <h2>Daily Timers</h2>
        <button class="close-btn">Close</button>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
